name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build prebuilt per-platform binary tarballs and attach them to the GitHub
  # Release. install.sh downloads these when present; the naming convention here
  # (lingtai-<tag>-<os>-<arch>.tar.gz, os=darwin|linux, arch=amd64|arm64) MUST
  # match install.sh's asset_name(). When this job is skipped or fails, install.sh
  # falls back to building the release source tarball, so releases still install.
  release-assets:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build binaries
        env:
          TAG: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          ldflags="-X main.version=${TAG}"

          mkdir -p dist
          CGO_ENABLED=0 go -C tui build -ldflags "$ldflags" -o "$PWD/dist/lingtai-tui" .

          (cd portal/web && npm ci && npm run build)
          CGO_ENABLED=0 go -C portal build -ldflags "$ldflags" -o "$PWD/dist/lingtai-portal" .

      - name: Package tarball
        id: pkg
        env:
          TAG: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          name="lingtai-${TAG}-${GOOS}-${GOARCH}.tar.gz"
          tar -C dist -czf "$name" lingtai-tui lingtai-portal
          echo "asset=$name" >> "$GITHUB_OUTPUT"
          shasum -a 256 "$name" | tee "${name}.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ASSET: ${{ steps.pkg.outputs.asset }}
        run: |
          set -euo pipefail
          # Create the release if it does not exist yet, then attach assets.
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG"
          ensure_asset() {
            local name="$1" remote local_sha remote_sha
            if gh release view "$TAG" --json assets | python3 -c 'import json,sys; n=sys.argv[1]; print(any(a.get("name") == n for a in json.load(sys.stdin)["assets"]))' "$name" | grep -qx true; then
              remote="$(mktemp "${TMPDIR:-/tmp}/lingtai-release-${name}.XXXXXX")"
              gh release download "$TAG" --pattern "$name" --output "$remote"
              local_sha="$(sha256sum "$name" | cut -d' ' -f1)"
              remote_sha="$(sha256sum "$remote" | cut -d' ' -f1)"
              [[ "$local_sha" == "$remote_sha" ]] || { echo "error: existing GitHub asset $name differs; refusing replacement" >&2; exit 1; }
              echo "GitHub asset $name already has identical bytes; skipping"
            else
              gh release upload "$TAG" "$name"
            fi
          }
          ensure_asset "$ASSET"
          ensure_asset "${ASSET}.sha256"

  # Serial by design: waits for every release-assets matrix leg so it only ever
  # references archives that are already uploaded — it never independently
  # rebuilds or re-resolves "latest" for either TUI or kernel. This is what
  # binds one TUI tag to one exact, repo-pinned kernel release (kernel-release.json)
  # so the installer can never combine incompatible TUI/kernel versions.
  publish-bundle:
    needs: release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # sync_gitee_mirror.sh needs the release commit's full history
          # reachable to push it as a fast-forward; a shallow checkout (the
          # actions/checkout@v4 default) would break that.
          fetch-depth: 0

      - name: Read repo-owned kernel pin
        id: pin
        run: |
          set -euo pipefail
          tag="$(python3 -c 'import json; print(json.load(open("kernel-release.json"))["kernel_tag"])')"
          echo "kernel_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Fetch pinned kernel release manifest (fail loud if incoherent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KERNEL_TAG: ${{ steps.pin.outputs.kernel_tag }}
        run: |
          set -euo pipefail
          echo "Verifying kernel release $KERNEL_TAG exists on Lingtai-AI/lingtai-kernel and carries a release manifest..."
          if ! gh release view "$KERNEL_TAG" --repo Lingtai-AI/lingtai-kernel >/dev/null 2>&1; then
            echo "error: pinned kernel release $KERNEL_TAG does not exist on Lingtai-AI/lingtai-kernel." >&2
            echo "       kernel-release.json pins a kernel tag that has not been published yet." >&2
            echo "       This is a fail-loud stop: publish-bundle refuses to ship a half-bundle." >&2
            exit 1
          fi
          gh release download "$KERNEL_TAG" --repo Lingtai-AI/lingtai-kernel \
            --pattern 'lingtai-kernel-release-manifest.json' --output kernel-release-manifest.json
          KERNEL_TAG="$KERNEL_TAG" python3 - <<'PY'
          import json
          import os

          expected_tag = os.environ["KERNEL_TAG"]
          data = json.load(open("kernel-release-manifest.json"))
          assert data["schema"] == "lingtai.kernel.release/v1", data.get("schema")
          assert data["kernel_tag"] == expected_tag, (data["kernel_tag"], expected_tag)
          assert data["artifacts"], "kernel manifest has no artifacts"
          print(f"kernel manifest OK: {data['kernel_tag']} ({data['commit'][:12]}), {len(data['artifacts'])} artifact(s)")
          PY

      - name: Download release archives (exact bytes already uploaded)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # gh release download pulls the exact bytes+sidecars that
          # release-assets already uploaded — this job never rebuilds them.
          gh release download "$TAG" --repo "${{ github.repository }}" \
            --pattern "lingtai-${TAG}-*.tar.gz*" --dir bundle-archives

      - name: Build TUI bundle manifest
        env:
          TAG: ${{ github.ref_name }}
          KERNEL_TAG: ${{ steps.pin.outputs.kernel_tag }}
          COMMIT: ${{ github.sha }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import hashlib
          from pathlib import Path

          tag = os.environ["TAG"]
          kernel_tag = os.environ["KERNEL_TAG"]
          commit = os.environ["COMMIT"]
          github_repo = os.environ["GITHUB_REPO"]

          kernel_manifest = json.loads(Path("kernel-release-manifest.json").read_text())
          kernel_version = kernel_manifest["kernel_version"]

          archives_dir = Path("bundle-archives")
          archives = []
          for archive_path in sorted(archives_dir.glob(f"lingtai-{tag}-*.tar.gz")):
              sha_path = archive_path.with_name(archive_path.name + ".sha256")
              recorded_sha = sha_path.read_text().split()[0]
              actual_sha = hashlib.sha256(archive_path.read_bytes()).hexdigest()
              assert actual_sha == recorded_sha, (
                  f"{archive_path.name}: sidecar sha256 {recorded_sha} != "
                  f"actual {actual_sha}"
              )
              archives.append({"filename": archive_path.name, "sha256": actual_sha})

          assert archives, f"no lingtai-{tag}-*.tar.gz archives found in {archives_dir}"

          manifest = {
              "schema": "lingtai.tui.bundle/v1",
              "bundle_id": tag,
              "tui_tag": tag,
              "tui_commit": commit,
              "generated_at": __import__("datetime").datetime.now(
                  __import__("datetime").timezone.utc
              ).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "kernel_tag": kernel_tag,
              "kernel_version": kernel_version,
              "kernel_manifest_filename": "lingtai-kernel-release-manifest.json",
              "archives": archives,
              "providers": {
                  "github": {"repo": github_repo},
                  "gitee": {"owner": "huangzesen1997", "repo": "lingtai"},
              },
          }
          Path("lingtai-bundle-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          print(json.dumps(manifest, indent=2))
          PY

      - name: Upload bundle manifest to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --json assets | python3 -c 'import json,sys; print(any(a.get("name") == "lingtai-bundle-manifest.json" for a in json.load(sys.stdin)["assets"]))' | grep -qx true; then
            remote="$(mktemp "${TMPDIR:-/tmp}/lingtai-bundle-manifest.XXXXXX")"
            gh release download "$TAG" --pattern lingtai-bundle-manifest.json --output "$remote"
            local_sha="$(sha256sum lingtai-bundle-manifest.json | cut -d' ' -f1)"
            remote_sha="$(sha256sum "$remote" | cut -d' ' -f1)"
            [[ "$local_sha" == "$remote_sha" ]] || { echo "error: existing GitHub asset lingtai-bundle-manifest.json differs; refusing replacement" >&2; exit 1; }
            echo "GitHub asset lingtai-bundle-manifest.json already has identical bytes; skipping"
          else
            gh release upload "$TAG" lingtai-bundle-manifest.json
          fi

      - name: Assemble bundle directory for Gitee publish
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p gitee-bundle
          cp lingtai-bundle-manifest.json gitee-bundle/
          cp bundle-archives/lingtai-"${TAG}"-*.tar.gz* gitee-bundle/

      - name: Non-force synchronize the exact commit/tag to Gitee
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Skips cleanly (exit 0, prints why) when GITEE_ACCESS_TOKEN is
          # unset — see sync_gitee_mirror.sh. Every push is non-force; a
          # divergence/existing-tag conflict fails this step loud rather
          # than silently overwriting the mirror. This IS the tag-push
          # release path (release.yml only triggers on `v*` tag pushes), so
          # it always runs --execute when the token is configured.
          ./scripts/sync_gitee_mirror.sh \
            --commit "${{ github.sha }}" \
            --tag "$TAG" \
            --branch main \
            --execute

      - name: Publish bundle to Gitee (real publish when GITEE_ACCESS_TOKEN is set)
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # This job runs only on a real `v*` tag push (release.yml's only
          # trigger) — it IS the authorized release action, not a
          # shape-check. publish_bundle_to_gitee.sh skips the Gitee leg
          # internally (prints why, exits 0) when GITEE_ACCESS_TOKEN is
          # unset; when it IS set, this publishes for real. Idempotent
          # (skips already-attached same-name assets) and never
          # force-syncs/deletes.
          if [[ -n "${GITEE_ACCESS_TOKEN:-}" ]]; then
            ./scripts/publish_bundle_to_gitee.sh --tag "$TAG" --bundle-dir gitee-bundle --execute
          else
            echo "GITEE_ACCESS_TOKEN is not set; running the publish plan in dry-run mode only."
            ./scripts/publish_bundle_to_gitee.sh --tag "$TAG" --bundle-dir gitee-bundle
          fi

  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Compute source tarball checksum
        id: sha
        env:
          TAG: ${{ github.ref_name }}
        run: |
          url="https://github.com/Lingtai-AI/lingtai/archive/refs/tags/${TAG}.tar.gz"
          sha=$(curl -sL "$url" | shasum -a 256 | cut -d' ' -f1)
          echo "source=$sha" >> "$GITHUB_OUTPUT"
          echo "Source tarball SHA256: $sha"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Lingtai-AI/homebrew-lingtai
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.sha.outputs.source }}
        run: |
          VERSION="${TAG#v}"
          cat > homebrew-tap/lingtai-tui.rb << FORMULA
          class LingtaiTui < Formula
            desc "Terminal UI for the Lingtai AI agent framework"
            homepage "https://github.com/Lingtai-AI/lingtai"
            version "${VERSION}"
            license "Apache-2.0"

            url "https://github.com/Lingtai-AI/lingtai/archive/refs/tags/${TAG}.tar.gz"
            sha256 "${SHA}"

            depends_on "go" => :build
            depends_on "node" => :build
            depends_on "uv" => :recommended
            depends_on "python@3.13" => :recommended

            def install
              # Network mirror selection. Go-module mirrors and the npm registry are
              # configured independently — a Go proxy outage must not force an npm
              # registry switch (and vice versa).
              #
              # Go modules:
              #   1. HOMEBREW_GOPROXY (explicit user override) — community convention,
              #      survives Homebrew's superenv scrub because of the HOMEBREW_ prefix.
              #   2. Auto-detect: probe a stable proxy.golang.org API endpoint with a
              #      3s timeout. If unreachable (typical on mainland China networks),
              #      fall back to CN-accessible mirrors for Go modules and the Go
              #      checksum database (sum.golang.google.cn is Google's own
              #      CN-reachable alias of sum.golang.org, required for CN builds).
              #   3. Otherwise: leave ENV untouched — users elsewhere see no difference.
              #
              # npm registry:
              #   1. HOMEBREW_NPM_CONFIG_REGISTRY (explicit user override) — same
              #      HOMEBREW_ prefix trick so it survives the superenv scrub.
              #   2. Auto-detect ONLY when the Go proxy was unreachable AND an npm
              #      client probe to registry.npmmirror.com succeeds. Use npm (not curl)
              #      so the probe exercises the same Node/npm TLS trust store that
              #      `npm ci` will use; otherwise leave the npm registry on its default.
              #   3. Otherwise: leave ENV untouched.
              if ENV["HOMEBREW_GOPROXY"]
                ENV["GOPROXY"] = ENV["HOMEBREW_GOPROXY"]
                go_proxy_reachable = true
              else
                go_proxy_reachable = quiet_system(
                  "curl", "-sSfL", "--max-time", "3", "-o", "/dev/null",
                  "https://proxy.golang.org/github.com/golang/go/@latest"
                )
                unless go_proxy_reachable
                  opoo "proxy.golang.org unreachable; using China-friendly Go build mirrors."
                  ENV["GOPROXY"] = "https://goproxy.cn,direct"
                  ENV["GOSUMDB"] = "sum.golang.google.cn"
                end
              end

              if ENV["HOMEBREW_NPM_CONFIG_REGISTRY"]
                ENV["NPM_CONFIG_REGISTRY"] = ENV["HOMEBREW_NPM_CONFIG_REGISTRY"]
              elsif !go_proxy_reachable
                npmmirror_reachable = quiet_system(
                  "npm", "ping", "--registry=https://registry.npmmirror.com",
                  "--fetch-timeout=3000", "--fetch-retries=0"
                )
                if npmmirror_reachable
                  opoo "Using China-friendly npm registry (registry.npmmirror.com)."
                  ENV["NPM_CONFIG_REGISTRY"] = "https://registry.npmmirror.com"
                else
                  opoo "registry.npmmirror.com failed npm's connectivity/TLS probe; leaving npm registry unchanged. Set HOMEBREW_NPM_CONFIG_REGISTRY to override."
                end
              end

              cd "tui" do
                ldflags = "-X main.version=#{version}"
                system "go", "build", *std_go_args(ldflags: ldflags), "-o", bin/"lingtai-tui", "."
              end

              cd "portal" do
                cd "web" do
                  system "npm", "ci"
                  system "npm", "run", "build"
                end
                ldflags = "-X main.version=#{version}"
                system "go", "build", *std_go_args(ldflags: ldflags), "-o", bin/"lingtai-portal", "."
              end
            end

            test do
              assert_match "lingtai-tui", shell_output("#{bin}/lingtai-tui version 2>&1", 0)
            end
          end
          FORMULA

      - name: Push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lingtai-tui.rb
          git diff --cached --quiet || git commit -m "Update lingtai-tui to ${{ github.ref_name }}"
          git push
