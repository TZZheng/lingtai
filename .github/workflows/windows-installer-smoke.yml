name: Windows Installer Smoke

# Runs the native-Windows installer contract suite (scripts/test-install-ps1.ps1)
# under BOTH Windows PowerShell 5.1 (Desktop) and PowerShell 7 (Core) on
# windows-latest. Public-mode contracts (tag/latest resolution, bundle
# manifest validation, Windows archive download/verify, pinned-kernel venv
# install) run against a local fake GitHub API inside the suite -- no live
# release or secrets are used on this trigger.
#
# A separate exact-tag smoke (below) runs ONLY on a pushed v* tag, after
# release.yml has had a chance to publish that tag's real assets; it is not
# part of pull_request CI and never depends on "latest".

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'install.ps1'
      - 'scripts/test-install-ps1.ps1'
      - '.github/workflows/windows-installer-smoke.yml'
  pull_request:
    paths:
      - 'install.ps1'
      - 'scripts/test-install-ps1.ps1'
      - '.github/workflows/windows-installer-smoke.yml'

permissions:
  contents: read

jobs:
  windows-powershell-5-1:
    name: Windows PowerShell 5.1 (Desktop)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin a deterministic, contract-supported CPython (3.11/3.12/3.13) on PATH.
      # windows-latest's ambient default `py -3` can drift to an unsupported
      # interpreter (e.g. 3.14) ahead of this repo's supported range, which
      # would otherwise leave the real-runtime venv+wheel contract permanently
      # unexercised (NOT-YET) on every run.
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # CPython 3.12+ dropped bundling setuptools/wheel with ensurepip (only
      # pip itself is guaranteed), so a --no-build-isolation `pip wheel` build
      # of CONTRACT 18's offline test fixture otherwise fails with
      # "No module named 'setuptools'" on a fresh setup-python interpreter.
      - name: Install build prerequisites for the offline wheel fixture
        shell: powershell
        run: |
          python -m pip install --upgrade setuptools wheel

      - name: Report host edition
        shell: powershell
        run: |
          "$($PSVersionTable.PSEdition) $($PSVersionTable.PSVersion)"

      - name: Run installer contract suite (Windows PowerShell 5.1)
        shell: powershell
        run: |
          .\scripts\test-install-ps1.ps1

  powershell-7:
    name: PowerShell 7 (Core)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin a deterministic, contract-supported CPython (3.11/3.12/3.13) on PATH.
      # windows-latest's ambient default `py -3` can drift to an unsupported
      # interpreter (e.g. 3.14) ahead of this repo's supported range, which
      # would otherwise leave the real-runtime venv+wheel contract permanently
      # unexercised (NOT-YET) on every run.
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # CPython 3.12+ dropped bundling setuptools/wheel with ensurepip (only
      # pip itself is guaranteed), so a --no-build-isolation `pip wheel` build
      # of CONTRACT 18's offline test fixture otherwise fails with
      # "No module named 'setuptools'" on a fresh setup-python interpreter.
      - name: Install build prerequisites for the offline wheel fixture
        shell: pwsh
        run: |
          python -m pip install --upgrade setuptools wheel

      - name: Report host edition
        shell: pwsh
        run: |
          "$($PSVersionTable.PSEdition) $($PSVersionTable.PSVersion)"

      - name: Run installer contract suite (PowerShell 7)
        shell: pwsh
        run: |
          ./scripts/test-install-ps1.ps1

  windows-release-asset-smoke:
    name: Exact-tag release asset smoke (pwsh)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-powershell-5-1, powershell-7]
    runs-on: windows-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Wait for this tag's Windows release asset to be published
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINGTAI_VERSION: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $assetName = "lingtai-$($env:LINGTAI_VERSION)-windows-amd64.zip"
          # release.yml runs as an independent workflow triggered by the same
          # tag push; there is no ordering guarantee between the two, so poll
          # for the asset rather than assuming it already exists.
          $deadline = (Get-Date).AddMinutes(15)
          $found = $false
          while ((Get-Date) -lt $deadline) {
            $names = (gh release view $env:LINGTAI_VERSION --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name') 2>$null
            if ($names -contains $assetName) { $found = $true; break }
            Start-Sleep -Seconds 20
          }
          if (-not $found) {
            Write-Error "post-release smoke: $assetName was not published within 15 minutes of the tag push"
            exit 1
          }

      - name: Install TUI and portal binaries from this exact tag's published release (SkipVenv)
        shell: pwsh
        env:
          LINGTAI_VERSION: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $binDir = Join-Path $env:RUNNER_TEMP 'lingtai-smoke-bin'
          $globalDir = Join-Path $env:RUNNER_TEMP 'lingtai-smoke-global'
          .\install.ps1 -Version $env:LINGTAI_VERSION -BinDir $binDir -GlobalDir $globalDir -SkipVenv -NoModifyPath
          $tuiPath = Join-Path $binDir 'lingtai-tui.exe'
          $portalPath = Join-Path $binDir 'lingtai-portal.exe'
          if (-not (Test-Path -LiteralPath $portalPath -PathType Leaf)) {
            Write-Error "post-release smoke: installed lingtai-portal.exe is missing at '$portalPath'"
            exit 1
          }
          $reported = & $tuiPath version
          if ($reported.Trim() -ne "lingtai-tui $env:LINGTAI_VERSION") {
            Write-Error "post-release smoke: expected 'lingtai-tui $env:LINGTAI_VERSION', got '$reported'"
            exit 1
          }
          Write-Host "OK: $reported"
          $portalReported = & $portalPath version
          if ($portalReported.Trim() -ne "lingtai-portal $env:LINGTAI_VERSION") {
            Write-Error "post-release smoke: expected 'lingtai-portal $env:LINGTAI_VERSION', got '$portalReported'"
            exit 1
          }
          Write-Host "OK: $portalReported"
